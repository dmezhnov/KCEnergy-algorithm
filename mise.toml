[tasks.test]
description = "Test algorithm files (no-op)"
run = '''
echo 'No tests configured'
for sm in $(git submodule foreach --quiet 'echo $sm_path'); do
  (cd "$sm" && mise run test) &
done
wait
'''

[tasks.lint]
description = "Lint algorithm files (no-op)"
run = '''
echo 'No linter configured'
for sm in $(git submodule foreach --quiet 'echo $sm_path'); do
  (cd "$sm" && mise run lint) &
done
wait
'''

[tasks.save]
description = "Save uncommitted changes"
run = '''
for sm in $(git submodule foreach --quiet 'echo $sm_path'); do
  (cd "$sm" && mise run save)
done
if [ -n "$(git status --porcelain)" ]; then
  git add -A && git commit -m "draft-$(date +%Y-%m-%d-%H-%M-%S)"
fi
'''

[tasks.install]
description = "Install dependencies"
run = '''
git submodule update --init --recursive
for sm in $(git submodule foreach --quiet 'echo $sm_path'); do
  (cd "$sm" && mise run install)
done
'''

[tasks.list]
description = "List all algorithm steps"
run = "ls -1 *.lang | sort"
