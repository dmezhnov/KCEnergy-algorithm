[tasks.test]
description = "Test algorithm files (no-op)"
run = "echo No tests configured"

[tasks.lint]
description = "Lint algorithm files (no-op)"
run = "echo No linter configured"

[tasks.save]
description = "Save uncommitted changes"
run = "bun run ../scripts/save-from-child.bun.ts"

[tasks.install]
description = "Install dependencies"
run = "git submodule update --init --recursive"

[tasks.list]
description = "List all algorithm steps"
run = "ls -1 *.lang | sort"
